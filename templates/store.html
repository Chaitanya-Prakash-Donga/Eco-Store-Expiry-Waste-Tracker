<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eco-Store Tracker</title>
    <style>
        /* Base Styles */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f4f7f4; color: #333; }
        .page { display: none; padding: 20px; }
        .page.active { display: block; }
        
        /* Auth Box */
        .auth-container { height: 100vh; display: flex; align-items: center; justify-content: center; }
        .auth-box { background: white; padding: 30px; border-radius: 12px; shadow: 0 4px 15px rgba(0,0,0,0.1); width: 100%; max-width: 400px; }
        input, select, button { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 6px; }
        button { background: #27ae60; color: white; border: none; cursor: pointer; font-weight: bold; }
        button:hover { background: #219150; }
        
        /* Dashboard Cards */
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; margin-bottom: 20px; }
        .card { background: white; padding: 20px; border-radius: 8px; text-align: center; border-left: 5px solid #27ae60; }
        .alert-card { border-left-color: #e74c3c; background: #fff5f5; }
    </style>
</head>
<body>

<div id="auth-page" class="page active">
    <div class="auth-container">
        <div class="auth-box">
            <h2 id="auth-title">Login to Eco-Store</h2>
            <form id="auth-form">
                <input type="email" id="email" placeholder="Email" required>
                <input type="password" id="password" placeholder="Password" required>
                <div id="register-fields" style="display:none;">
                    <input type="text" id="name" placeholder="Full Name">
                    <input type="text" id="store_name" placeholder="Store Name">
                    <select id="role">
                        <option value="owner">Owner</option>
                        <option value="manager">Manager</option>
                    </select>
                </div>
                <button type="submit" id="submit-btn">Login</button>
            </form>
            <p style="text-align:center; margin-top:10px; font-size:14px;">
                <span id="toggle-text">New store?</span> 
                <a href="#" onclick="toggleAuth()" id="toggle-link">Register here</a>
            </p>
        </div>
    </div>
</div>

<div id="dashboard-page" class="page">
    <div style="display:flex; justify-content:between; align-items:center;">
        <h2>Dashboard: <span id="display-store">Store</span></h2>
        <button onclick="logout()" style="width:auto; background:#888; padding: 5px 15px;">Logout</button>
    </div>
    
    <div class="stats-grid" id="stats-container">
        </div>

    <h3>Expiry Alerts (Next 3-4 Days)</h3>
    <div id="expiry-list"></div>

    <hr style="margin:20px 0;">
    
    <h3>Add Product</h3>
    <form id="product-form" style="max-width:500px;">
        <input type="text" id="p-name" placeholder="Product Name" required>
        <input type="number" id="p-qty" placeholder="Quantity" required>
        <input type="number" id="p-min" placeholder="Min Stock Alert Level">
        <input type="date" id="p-exp" placeholder="Expiry Date">
        <button type="button" onclick="addProduct()">Add to Inventory</button>
    </form>
</div>

<script>
    let isRegister = false;

    // --- REFRESH CHECK (CRITICAL) ---
    window.onload = function() {
        const token = localStorage.getItem('eco_token');
        if (token) {
            showPage('dashboard-page');
            loadDashboard();
        } else {
            showPage('auth-page');
        }
    };

    function showPage(id) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }

    function toggleAuth() {
        isRegister = !isRegister;
        document.getElementById('register-fields').style.display = isRegister ? 'block' : 'none';
        document.getElementById('auth-title').innerText = isRegister ? 'Register Store' : 'Login';
        document.getElementById('submit-btn').innerText = isRegister ? 'Create Account' : 'Login';
        document.getElementById('toggle-text').innerText = isRegister ? 'Have an account?' : 'New store?';
    }

    // --- AUTH LOGIC ---
    document.getElementById('auth-form').onsubmit = async (e) => {
        e.preventDefault();
        const path = isRegister ? '/api/auth/register' : '/api/auth/login';
        const body = {
            email: document.getElementById('email').value,
            password: document.getElementById('password').value
        };
        if (isRegister) {
            body.name = document.getElementById('name').value;
            body.store_name = document.getElementById('store_name').value;
            body.role = document.getElementById('role').value;
        }

        const res = await fetch(path, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(body)
        });

        const data = await res.json();
        if (res.ok) {
            if (isRegister) {
                alert("Registration successful! Please login.");
                toggleAuth();
            } else {
                localStorage.setItem('eco_token', data.token);
                showPage('dashboard-page');
                loadDashboard();
            }
        } else {
            alert(data.error || "Action failed");
        }
    };

    // --- DASHBOARD LOGIC ---
    async function loadDashboard() {
        const token = localStorage.getItem('eco_token');
        const res = await fetch('/api/dashboard', {
            headers: { 'Authorization': `Bearer ${token}` }
        });

        if (res.status === 401) return logout();

        const data = await res.json();
        
        // Render Stats
        document.getElementById('stats-container').innerHTML = `
            <div class="card"><h3>${data.metrics.total_products}</h3><p>Products</p></div>
            <div class="card alert-card"><h3>${data.metrics.expiry_count}</h3><p>Expiry Alerts</p></div>
            <div class="card"><h3>${data.metrics.low_stock_count}</h3><p>Low Stock</p></div>
        `;

        // Render Expiry Alerts
        const expiryDiv = document.getElementById('expiry-list');
        expiryDiv.innerHTML = data.expiry_alerts.length ? '' : '<p>No immediate expiries.</p>';
        data.expiry_alerts.forEach(p => {
            expiryDiv.innerHTML += `<div class="card alert-card" style="margin-bottom:5px;">
                <strong>${p.name}</strong> expires in ${p.days_left} days! (Qty: ${p.qty})
            </div>`;
        });
    }

    async function addProduct() {
        const token = localStorage.getItem('eco_token');
        const body = {
            name: document.getElementById('p-name').value,
            qty: parseInt(document.getElementById('p-qty').value),
            min: parseInt(document.getElementById('p-min').value) || 0,
            exp: document.getElementById('p-exp').value
        };

        const res = await fetch('/api/products', {
            method: 'POST',
            headers: { 
                'Content-Type': 'application/json',
                'Authorization': `Bearer ${token}`
            },
            body: JSON.stringify(body)
        });

        if (res.ok) {
            loadDashboard();
            document.getElementById('product-form').reset();
        }
    }

    function logout() {
        localStorage.removeItem('eco_token');
        location.reload();
    }
</script>
</body>
</html>
